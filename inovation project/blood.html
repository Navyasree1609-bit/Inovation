<!DOCTYPE html>
<html lang="en">
<head>
<title>Blood Help</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* PAGE DARK OVERLAY */
.page-overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.75);
    color:#fff;
}

/* DARK NAVBAR */
.navbar{
    background:rgba(0,0,0,0.65)!important;
    backdrop-filter:blur(10px);
}
.navbar-brand{
    color:#4dabf7!important;
    font-weight:600;
}

/* GLASS CARD DARK */
.glass-card{
    background:rgba(20,20,20,0.75);
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

/* INPUTS DARK */
.modern-input{
    background:#1f1f1f;
    border:none;
    color:#fff;
    border-radius:30px;
    padding:12px 18px;
}
.modern-input::placeholder{
    color:#bbb;
}
.modern-input:focus{
    outline:none;
    box-shadow:0 0 8px rgba(77,171,247,0.6);
}

/* BUTTONS */
.btn-success{
    background:#198754;
    border:none;
}
.btn-primary{
    background:#0d6efd;
    border:none;
}
</style>

</head>

<body style="background:url('https://images.unsplash.com/photo-1581595219315-a187dd40c322') no-repeat center center fixed; background-size:cover;">

<div class="page-overlay">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container">

    <!-- LEFT: LOGO -->
    <a class="navbar-brand" href="index.html">Community Help</a>

    <!-- CENTER: MENU -->
    <div class="mx-auto">
      <a class="nav-link d-inline text-white" href="blood.html">🩸 Blood Help</a>
      <a class="nav-link d-inline text-white" href="lostfound.html">🎒 Lost & Found</a>
      <a class="nav-link d-inline text-white" href="volunteer.html">🙋 Volunteer</a>
    </div>

    <!-- RIGHT: LOGIN / REGISTER -->
    <div id="authButtons" class="d-flex gap-2">
      <!-- Will be populated by updateNavbar() -->
    </div>

  </div>
</nav>

<div class="container py-5">

    <h2 class="text-center fw-bold mb-4">🩸 Post Blood Request</h2>

    <!-- FORM CARD -->
    <div class="glass-card p-4 mb-5">
        <div class="row g-3">
            <div class="col-md-4">
                <input class="form-control modern-input" id="bloodGroup" placeholder="Blood Group">
            </div>
            <div class="col-md-4">
                <input class="form-control modern-input" id="hospital" placeholder="Hospital">
            </div>
            <div class="col-md-4">
                <input class="form-control modern-input" id="location" placeholder="Location">
            </div>
            <div class="col-md-6">
                <input class="form-control modern-input" id="contact" placeholder="Contact Number">
            </div>
            <div class="col-md-6">
                <select class="form-control modern-input" id="urgency">
                    <option>Urgency Level</option>
                    <option>Normal</option>
                    <option>Urgent</option>
                    <option>Critical</option>
                </select>
            </div>
            <div class="col-12">
                <textarea class="form-control modern-input" id="notes" placeholder="Additional Notes (optional)"></textarea>
            </div>
            <div class="text-center mt-3">
                <button class="btn btn-success px-5 py-2 rounded-pill" id="submitBtn">
                    Submit Request
                </button>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <input id="locationFilter" class="form-control modern-input" placeholder="Enter your location to filter requests (e.g., Hyderabad)">
    </div>

    <h3 class="text-center fw-bold mb-4">Active Requests</h3>

    <!-- REQUEST CONTAINER -->
    <div id="requestsContainer"></div>

</div>

<!-- TOAST -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
protectPage();
updateNavbar();
new BloodRequestManager();
</script>
</body>
</html>
