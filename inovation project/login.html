<!DOCTYPE html>
<html lang="en">
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

/* DARK BACKGROUND OVERLAY */
.page-overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.65); /* lighter so content is visible */
    display:flex;
    align-items:center;
    justify-content:center;
}

/* GLASS CARD */
.card-dark{
    background:rgba(30,30,30,0.95);
    border-radius:20px;
    padding:40px;
    width:100%;
    max-width:400px;
    box-shadow:0 10px 35px rgba(0,0,0,0.8);
}

/* INPUTS */
.form-control{
    background:#2a2a2a;
    border:1px solid #444;
    color:#fff;
    border-radius:30px;
    padding:12px 18px;
}
.form-control::placeholder{
    color:#aaa;
}
.form-control:focus{
    background:#2a2a2a;
    color:#fff;
    border-color:#0d6efd;
    box-shadow:none;
}

/* BUTTON */
.btn-primary{
    background:#0d6efd;
    border:none;
    border-radius:30px;
    padding:10px;
}
</style>
</head>

<body style="background:black;">

<div class="page-overlay">
  <div class="card-dark text-center">
    <div class="mb-3">
      <a href="index.html" class="text-light text-decoration-none">
        <small>← Back to Home</small>
      </a>
    </div>
    <h3 class="mb-4">Login</h3>
    <input id="loginEmail" type="email" class="form-control mb-3" placeholder="Email">
    <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password">
    <button id="loginBtn" class="btn btn-primary w-100">Login</button>
    <div id="errorMsg" class="text-danger mt-2" style="display:none;"></div>
    <div class="mt-4 text-center" style="color:#ccc;">
      Don't have an account? <a href="register.html" style="color:#4dabf7; font-weight:500;">Register</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
if (localStorage.getItem('isLoggedIn') === 'true') {
    window.location.href = 'index.html';
}

document.getElementById('loginBtn').addEventListener('click', handleLogin);
</script>

</body>
</html>
