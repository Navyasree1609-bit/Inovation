<!DOCTYPE html>
<html lang="en">
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

.page-overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-dark{
    background:rgba(30,30,30,0.95);
    border-radius:20px;
    padding:40px;
    width:100%;
    max-width:500px;
    box-shadow:0 10px 35px rgba(0,0,0,0.8);
}

.form-control, select{
    background:#2a2a2a;
    border:1px solid #444;
    color:#fff;
    border-radius:30px;
    padding:12px 18px;
}
.form-control::placeholder{
    color:#aaa;
}
.form-control:focus{
    background:#2a2a2a;
    color:#fff;
    border-color:#198754;
    box-shadow:none;
}

.btn-success{
    background:#198754;
    border:none;
    border-radius:30px;
    padding:10px;
}
</style>
</head>

<body style="background:black;">

<div class="page-overlay">
  <div class="card-dark text-center">
    <div class="mb-3">
      <a href="index.html" class="text-light text-decoration-none">
        <small>← Back to Home</small>
      </a>
    </div>
    <h3 class="mb-4">Register</h3>
    <input id="regName" class="form-control mb-2" placeholder="Full Name">
    <input id="regEmail" class="form-control mb-2" placeholder="Email">
    <input id="regPhone" class="form-control mb-2" placeholder="Phone">
    <input id="regLocation" class="form-control mb-2" placeholder="Location">
    <select id="regRole" class="form-control mb-2">
        <option>Select Role</option>
        <option>Blood Donor</option>
        <option>Volunteer</option>
        <option>Helper</option>
    </select>
    <input id="regPassword" type="password" class="form-control mb-3" placeholder="Password">
    <button id="regBtn" class="btn btn-success w-100">Register</button>
    <div id="registerMsg" class="text-success mt-2" style="display:none;"></div>
    <div class="mt-4 text-center" style="color:#ccc;">
      Already have an account? <a href="login.html" style="color:#4dabf7; font-weight:500;">Login</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
document.getElementById('regBtn').addEventListener('click', handleRegister);
</script>

</body>
</html>
