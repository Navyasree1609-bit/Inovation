<!DOCTYPE html>
<html lang="en">
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* PAGE DARK OVERLAY */
.page-overlay{
    min-height:100vh;
    background:linear-gradient(to bottom right, rgba(0,0,0,0.85), rgba(0,0,0,0.75));
    color:#fff;
}

/* DARK NAVBAR */
.navbar{
    background:rgba(0,0,0,0.7)!important;
    backdrop-filter:blur(12px);
}
.navbar-brand{
    color:#4dabf7!important;
    font-weight:600;
    letter-spacing:0.5px;
}

/* GLASS CARD DARK */
.glass-card{
    background:rgba(25,25,25,0.8);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.7);
    color:#fff;
    transition:all 0.3s ease;
}
.glass-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,0.9);
}

/* BUTTON */
.btn-primary{
    background:#0d6efd;
    border:none;
    padding:8px 20px;
}
.btn-primary:hover{
    background:#0b5ed7;
}
</style>

</head>

<body style="background:url('https://images.unsplash.com/photo-1508780709619-79562169bc64') no-repeat center center fixed; background-size:cover;">

<div class="page-overlay">

<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container">

    <!-- LEFT: LOGO -->
    <a class="navbar-brand" href="index.html">Community Help</a>

    <!-- CENTER: MENU -->
    <div class="mx-auto">
      <a class="nav-link d-inline text-white" href="blood.html">🩸 Blood Help</a>
      <a class="nav-link d-inline text-white" href="lostfound.html">🎒 Lost & Found</a>
      <a class="nav-link d-inline text-white" href="volunteer.html">🙋 Volunteer</a>
    </div>

    <!-- RIGHT: LOGIN / REGISTER -->
    <div id="authButtons" class="d-flex gap-2">
      <!-- Will be populated by updateNavbar() -->
    </div>

  </div>
</nav>

<div class="container py-5 text-center">
    <h2 id="welcomeMsg" class="fw-bold mb-5">Welcome, Community Hero 👋</h2>
    <p class="text-center mb-4">Points: <span id="userPoints" class="fw-bold">0</span> | Badge: <span id="userBadge" class="fw-bold">Beginner</span></p>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="glass-card p-4">
                <i class="fa-solid fa-droplet fa-2x text-danger mb-3"></i>
                <h5>Blood Requests</h5>
                <p id="bloodStats">Total: 0 | Critical: 0</p>
                <a href="blood.html" class="btn btn-primary rounded-pill mt-2">Go</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card p-4">
                <i class="fa-solid fa-magnifying-glass fa-2x text-warning mb-3"></i>
                <h5>Lost & Found</h5>
                <p id="lostStats">Total Posts: 0</p>
                <a href="lostfound.html" class="btn btn-primary rounded-pill mt-2">Go</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card p-4">
                <i class="fa-solid fa-hands-helping fa-2x text-success mb-3"></i>
                <h5>Volunteer Events</h5>
                <p id="volunteerStats">Total Volunteers: 0</p>
                <a href="volunteer.html" class="btn btn-primary rounded-pill mt-2">Go</a>
            </div>
        </div>
    </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function getBadge(points) {
    if (points >= 50) return 'Hero';
    if (points >= 10) return 'Helper';
    return 'Beginner';
}

function updateStats() {
    // Blood requests stats
    const bloodRequests = JSON.parse(localStorage.getItem('bloodRequests')) || [];
    const totalBlood = bloodRequests.length;
    const criticalBlood = bloodRequests.filter(r => r.urgency === 'Critical').length;
    document.getElementById('bloodStats').textContent = `Total: ${totalBlood} | Critical: ${criticalBlood}`;

    // Lost & Found posts
    const lostPosts = JSON.parse(localStorage.getItem('lostFoundPosts')) || [];
    document.getElementById('lostStats').textContent = `Total Posts: ${lostPosts.length}`;

    // Volunteers (users with role 'Volunteer')
    const users = JSON.parse(localStorage.getItem('users')) || [];
    const totalVolunteers = users.filter(u => u.role === 'Volunteer').length;
    document.getElementById('volunteerStats').textContent = `Total Volunteers: ${totalVolunteers}`;
}

protectPage();
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (currentUser) {
    document.getElementById('welcomeMsg').textContent = `Welcome, ${currentUser.name} 👋`;
    document.getElementById('userPoints').textContent = currentUser.points || 0;
    document.getElementById('userBadge').textContent = getBadge(currentUser.points || 0);
    updateStats();
    // Update stats every 5 seconds for real-time feel
    setInterval(updateStats, 5000);
}

// Update navbar for logged-in users
updateNavbar();
</script>
</body>
</html>
