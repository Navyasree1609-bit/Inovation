<!DOCTYPE html>
<html lang="en">
<head>
<title>Volunteer Events</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* DARK NAVBAR */
.navbar{
    background:rgba(0,0,0,0.7)!important;
    backdrop-filter:blur(12px);
}
.navbar-brand{
    color:#4dabf7!important;
    font-weight:600;
    letter-spacing:0.5px;
}

/* GLASS CARD DARK */
.glass-card{
    background:rgba(25,25,25,0.8);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.7);
    color:#fff;
    transition:all 0.3s ease;
}
.glass-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,0.9);
}

/* INPUTS DARK */
.modern-input{
    background:#1f1f1f;
    border:none;
    color:#fff;
    border-radius:30px;
    padding:12px 18px;
}
.modern-input::placeholder{
    color:#bbb;
}
.modern-input:focus{
    outline:none;
    box-shadow:0 0 8px rgba(77,171,247,0.6);
}

/* BUTTONS */
.btn-success{
    background:#198754;
    border:none;
}
.btn-primary{
    background:#0d6efd;
    border:none;
}
</style>
</head>

<body style="background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center center fixed; background-size: cover;">

<div class="page-overlay">

<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container">

    <!-- LEFT: LOGO -->
    <a class="navbar-brand" href="index.html">Community Help</a>

    <!-- CENTER: MENU -->
    <div class="mx-auto">
      <a class="nav-link d-inline text-white" href="blood.html">🩸 Blood Help</a>
      <a class="nav-link d-inline text-white" href="lostfound.html">🎒 Lost & Found</a>
      <a class="nav-link d-inline text-white" href="volunteer.html">🙋 Volunteer</a>
    </div>

    <!-- RIGHT: LOGIN / REGISTER -->
    <div id="authButtons" class="d-flex gap-2">
      <!-- Will be populated by updateNavbar() -->
    </div>

  </div>
</nav>

<div class="container py-5">
    <h2 class="text-center fw-bold mb-4">🙋 Volunteer Opportunities</h2>

    <!-- FORM -->
    <div class="glass-card p-4 mb-5">
        <input id="eventTitle" class="form-control modern-input mb-3" placeholder="Event Title">
        <input id="eventType" class="form-control modern-input mb-3" placeholder="Type of Event">
        <input id="eventDate" type="date" class="form-control modern-input mb-3">
        <input id="eventLocation" class="form-control modern-input mb-3" placeholder="Location">
        <input id="volunteersNeeded" class="form-control modern-input mb-3" placeholder="Volunteers Needed">
        <div class="text-center">
            <button id="postEvent" class="btn btn-success px-5 py-2 rounded-pill">
                Post Event
            </button>
        </div>
    </div>

    <h3 class="text-center fw-bold mb-4">Upcoming Events</h3>

    <!-- EVENTS CONTAINER -->
    <div id="eventsContainer"></div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
protectPage();
updateNavbar();
new VolunteerEventManager();
</script>
</body>
</html>
